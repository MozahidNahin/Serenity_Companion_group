<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"
/>
    <title>Serenity - Mental Health Companion</title>

   <link 
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstra
p.min.css"
     rel="stylesheet" 
     integrity="sha384-
sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
     crossorigin="anonymous"
    />

    <style>
        body { background-color: #e8f4f8; }
        .chat-container { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 30px; margin-bottom: 30px;}
        #chat-box { height: 350px; overflow-y: auto; background: #fafafa; border-radius: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; margin-bottom: 10px; word-wrap: break-word; }
        .user-msg { background-color: #d1ecf1; color: #0c5460; float: right; clear: both; border-bottom-right-radius: 2px; }
        .bot-msg { background-color: #e2e3e5; color: #383d41; float: left; clear: both; border-bottom-left-radius: 2px; }
        
        .breathe-circle { width: 100px; height: 100px; background-color: #a3d2ca; border-radius: 50%; margin: 20px auto; display: none; animation: breathe 8s infinite alternate; }
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.5); } }
    </style>
</head>
<body>

<div class="container chat-container p-4 col-md-8 col-lg-6">
    <h1 class="text-center mb-4" style="color: #5a8b9e;">Serenity Companion</h1>
    
    <div class="text-center mb-3">
        <p class="text-muted">How are you feeling right now?</p>
        <button class="btn btn-outline-success btn-sm m-1" onclick="setEmotion('Happy')">😊 Happy</button>
        <button class="btn btn-outline-warning btn-sm m-1" onclick="setEmotion('Tired')">😩 Tired</button>
        <button class="btn btn-outline-danger btn-sm m-1" onclick="setEmotion('Stressed')">🤯 Stressed</button>
        <button class="btn btn-outline-secondary btn-sm m-1" onclick="setEmotion('Sad')">😢 Sad</button>
    </div>
    
    <div class="text-center mb-4">
        <button class="btn btn-info text-white" onclick="toggleBreathe()">🧘 Deep Breathing Exercise</button>
        <div id="breatheCircle" class="breathe-circle"></div>
    </div>

    <div id="chat-box" class="p-3 border">
        <div class="msg bot-msg">Hi there! I'm Serenity. I'm here to listen. What's on your mind today?</div>
    </div>
    
    <div class="input-group mt-3">
        <input type="text" id="userInput" class="form-control rounded-start" placeholder="Type your message here..." onkeypress="handleEnter(event)">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>

<script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
    crossorigin="anonymous">
</script>
    
<script>
    let currentEmotion = "Neutral";

    function setEmotion(emotion) {
        currentEmotion = emotion;
        alert("Emotion noted: " + emotion);
    }

    function toggleBreathe() {
        let circle = document.getElementById("breatheCircle");
        circle.style.display = circle.style.display === "none" || circle.style.display === "" ? "block" : "none";
    }

    function handleEnter(event) {
        if (event.key === "Enter") sendMessage();
    }

    function sendMessage() {
        let inputField = document.getElementById("userInput");
        let message = inputField.value.trim();
        if (message === "") return;

        let chatBox = document.getElementById("chat-box");
        
        chatBox.insertAdjacentHTML('beforeend', `<div class="msg user-msg">${message}</div>`);
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        let typingId = "typing-" + Date.now();
        chatBox.insertAdjacentHTML('beforeend', `<div id="${typingId}" class="msg bot-msg">Serenity is typing...</div>`);
        chatBox.scrollTop = chatBox.scrollHeight;

        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message, emotion: currentEmotion })
        })
        .then(response => response.json())
        .then(data => {
            console.log("Data sent from Python:", data);

            let typingElement = document.getElementById(typingId);
            if (typingElement) typingElement.remove(); 
            
            if (data.error) {
                chatBox.insertAdjacentHTML('beforeend', `<div class="msg bot-msg text-danger">Error from Backend: ${data.error}</div>`);
            } else if (data.reply || data.response) {
                let cleanReply = (data.reply || data.response).replace(/[\s\S]*?<\/think>/g, '').trim();
                chatBox.insertAdjacentHTML('beforeend', `<div class="msg bot-msg">${cleanReply}</div>`);
            } else {
                chatBox.insertAdjacentHTML('beforeend', `<div class="msg bot-msg text-danger">Unknown error occurred. Check F12.</div>`);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        })
    }
</script>

</body>
</html>
